<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; gap: 24px; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        h1 { color: #00ffff; font-size: 24px; text-shadow: 0 0 20px rgba(0,255,255,0.3); }
        .admin-badge { font-size: 11px; background: rgba(255,51,102,0.2); color: #ff6699; border: 1px solid rgba(255,51,102,0.3); padding: 3px 8px; border-radius: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .welcome { color: #ccccee; font-size: 15px; margin-bottom: 20px; }
        .welcome strong { color: #fff; }
        .stat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .stat-label { color: #8888aa; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { color: #00ffff; font-size: 28px; font-weight: 700; text-shadow: 0 0 10px rgba(0,255,255,0.2); }
        .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
        .actions a { display: block; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-size: 15px; font-weight: 600; transition: transform 0.15s, box-shadow 0.15s; }
        .actions a:hover { transform: translateY(-1px); }
        .btn-primary { background: linear-gradient(135deg, #00ffff, #0088ff); color: #0f0f23; }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(0,255,255,0.3); }
        .btn-secondary { background: rgba(255,255,255,0.06); color: #ccccee; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .btn-logout { display: block; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-size: 15px; font-weight: 600; background: rgba(244,67,54,0.1); color: #ff6b6b; border: 1px solid rgba(244,67,54,0.2); cursor: pointer; width: 100%; transition: transform 0.15s, box-shadow 0.15s; font-family: inherit; }
        .btn-logout:hover { transform: translateY(-1px); background: rgba(244,67,54,0.2); }
        .leaderboard { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .leaderboard h2 { color: #00ffff; font-size: 18px; margin-bottom: 16px; text-shadow: 0 0 10px rgba(0,255,255,0.2); text-align: center; }
        .lb-entry { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; }
        .lb-entry.me { background: rgba(0,255,255,0.08); border: 1px solid rgba(0,255,255,0.15); }
        .lb-rank { color: #555577; font-size: 13px; font-weight: 700; width: 20px; text-align: right; }
        .lb-rank.gold { color: #ffd700; }
        .lb-rank.silver { color: #c0c0c0; }
        .lb-rank.bronze { color: #cd7f32; }
        .lb-name { color: #ccccee; font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lb-name.me-label { color: #00ffff; }
        .lb-score { color: #fff; font-size: 14px; font-weight: 700; }
        .lb-empty { color: #555577; text-align: center; font-size: 13px; padding: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Dashboard</h1>
            <span th:if="${user.admin}" class="admin-badge">Admin</span>
        </div>
        <p class="welcome">Welcome back, <strong th:text="${user.username}"></strong>!</p>
        <div class="stat">
            <span class="stat-label">Highscore</span>
            <span class="stat-value" th:text="${user.highscore}">0</span>
        </div>
        <div class="actions">
            <a th:href="@{/game}" class="btn-primary">Play Game</a>
            <a th:href="@{/profile}" class="btn-secondary">Profile</a>
            <form th:action="@{/logout}" method="post" style="display:block">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </div>
    <div class="leaderboard">
        <h2>Leaderboard</h2>
        <div th:each="entry, iter : ${leaderboard}" class="lb-entry" th:classappend="${entry.username == user.username} ? 'me'">
            <span class="lb-rank" th:classappend="${iter.index == 0} ? 'gold' : (${iter.index == 1} ? 'silver' : (${iter.index == 2} ? 'bronze' : ''))" th:text="${iter.index + 1}"></span>
            <span class="lb-name" th:classappend="${entry.username == user.username} ? 'me-label'" th:text="${entry.username}"></span>
            <span class="lb-score" th:text="${entry.highscore}"></span>
        </div>
        <div th:if="${#lists.isEmpty(leaderboard)}" class="lb-empty">No players yet</div>
    </div>
</body>
</html>
