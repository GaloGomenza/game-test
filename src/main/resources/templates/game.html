<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bullet Hell</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .game-area { display: flex; justify-content: center; align-items: flex-start; width: 100%; position: relative; }
        .game-col { display: flex; flex-direction: column; align-items: center; }
        .top-bar { display: flex; align-items: center; justify-content: center; width: 500px; margin-bottom: 12px; }
        .top-bar h2 { color: #00ffff; font-size: 18px; text-shadow: 0 0 10px rgba(0,255,255,0.3); }
        .top-bar .hs { color: #8888aa; font-size: 13px; }
        .top-bar .hs span { color: #00ffff; font-weight: 700; }
        #gameContainer { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 0 30px rgba(0,255,255,0.15), 0 8px 32px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        #gameCanvas { display: block; }
        #scoreOverlay { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 20px; font-weight: 700; color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.8); pointer-events: none; font-variant-numeric: tabular-nums; }
        #startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,30,0.92); padding: 20px; }
        #gameOverScreen { display: none; }
        #startScreen h2 { color: #00ffff; font-size: 32px; margin-bottom: 8px; text-shadow: 0 0 20px rgba(0,255,255,0.4); }
        #startScreen p { color: #8888aa; font-size: 14px; margin: 4px 0; }
        #gameOverScreen h2 { color: #ff3366; font-size: 28px; margin-bottom: 4px; text-shadow: 0 0 20px rgba(255,51,102,0.4); }
        .final-score { font-size: 52px; font-weight: 700; color: #fff; margin: 8px 0; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .result-msg { font-size: 20px; font-weight: 600; margin: 4px 0 12px; }
        .hs-display { font-size: 14px; color: #8888aa; margin-bottom: 16px; }
        .hs-display span { color: #00ffff; font-weight: 700; }
        .btn { padding: 10px 28px; font-size: 15px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; margin-top: 12px; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #00ffff, #0088ff); color: #0f0f23; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,255,255,0.3); }
        .btn-over { background: linear-gradient(135deg, #ff3366, #ff0088); color: #fff; }
        .btn-over:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(255,51,102,0.3); }
        .controls-hint { color: #555577; font-size: 12px; margin-top: 6px; }
        .leaderboard { position: absolute; left: calc(50% + 262px); top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; width: 220px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .leaderboard h2 { color: #00ffff; font-size: 16px; margin-bottom: 14px; text-shadow: 0 0 10px rgba(0,255,255,0.2); text-align: center; }
        .lb-entry { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; margin-bottom: 3px; }
        .lb-entry.me { background: rgba(0,255,255,0.08); border: 1px solid rgba(0,255,255,0.12); }
        .lb-rank { color: #555577; font-size: 12px; font-weight: 700; width: 16px; text-align: right; }
        .lb-rank.gold { color: #ffd700; }
        .lb-rank.silver { color: #c0c0c0; }
        .lb-rank.bronze { color: #cd7f32; }
        .lb-name { color: #ccccee; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lb-name.me-label { color: #00ffff; }
        .lb-score { color: #fff; font-size: 13px; font-weight: 700; }
        .lb-empty { color: #555577; text-align: center; font-size: 12px; padding: 16px 0; }
        nav { margin-top: 16px; display: flex; gap: 16px; align-items: center; }
        nav a { color: #8888aa; text-decoration: none; font-size: 13px; }
        nav a:hover { color: #00ffff; }
        .btn-nav-logout { background: none; border: none; color: #8888aa; text-decoration: none; font-size: 13px; cursor: pointer; font-family: inherit; padding: 0; }
        .btn-nav-logout:hover { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="game-area">
        <div class="game-col">
            <div class="top-bar">
                <h2>Bullet Hell</h2>
            </div>
            <div id="gameContainer">
                <canvas id="gameCanvas"></canvas>
                <div id="scoreOverlay"><span id="scoreDisplay">0</span></div>
                <div id="startScreen">
                    <h2>Bullet Hell</h2>
                    <p>Survive as long as you can</p>
                    <p class="controls-hint">Arrow keys / WASD to move</p>
                    <button id="startBtn" class="btn btn-primary">Start Game</button>
                </div>
                <div id="gameOverScreen">
                    <h2>Game Over</h2>
                    <p class="final-score"><span id="finalScore">0</span></p>
                    <p class="result-msg" id="resultMsg"></p>
                    <div id="highscoreSection" style="display:none">
                        <p class="hs-display">Highscore: <span id="highscore">0</span></p>
                    </div>
                    <button id="restartBtn" class="btn btn-over">Play Again</button>
                </div>
            </div>
        </div>
        <div class="leaderboard">
            <h2>Leaderboard</h2>
            <div th:each="entry, iter : ${leaderboard}" class="lb-entry" th:classappend="${entry.username == user.username} ? 'me'">
                <span class="lb-rank" th:classappend="${iter.index == 0} ? 'gold' : (${iter.index == 1} ? 'silver' : (${iter.index == 2} ? 'bronze' : ''))" th:text="${iter.index + 1}"></span>
                <span class="lb-name" th:classappend="${entry.username == user.username} ? 'me-label'" th:text="${entry.username}"></span>
                <span class="lb-score" th:text="${entry.highscore}"></span>
            </div>
            <div th:if="${#lists.isEmpty(leaderboard)}" class="lb-empty">No players yet</div>
        </div>
    </div>
    <nav>
        <a th:href="@{/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-nav-logout">Logout</button>
        </form>
    </nav>
    <script src="/js/game.js"></script>
</body>
</html>
