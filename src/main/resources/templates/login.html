<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        h1 { text-align: center; color: #00ffff; font-size: 28px; margin-bottom: 8px; text-shadow: 0 0 20px rgba(0,255,255,0.3); }
        .subtitle { text-align: center; color: #8888aa; font-size: 14px; margin-bottom: 30px; }
        .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; text-align: center; }
        .msg.error { background: rgba(244,67,54,0.15); color: #ff6b6b; border: 1px solid rgba(244,67,54,0.3); }
        .msg.success { background: rgba(76,175,80,0.15); color: #69db7c; border: 1px solid rgba(76,175,80,0.3); }
        form { display: flex; flex-direction: column; gap: 16px; }
        input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #00ffff; box-shadow: 0 0 8px rgba(0,255,255,0.2); }
        input::placeholder { color: #555577; }
        button { padding: 12px; background: linear-gradient(135deg, #00ffff, #0088ff); border: none; border-radius: 8px; color: #0f0f23; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,255,255,0.3); }
        button:active { transform: translateY(0); }
        .footer { text-align: center; margin-top: 20px; font-size: 14px; color: #6666aa; }
        .footer a { color: #00ffff; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Game Login</h1>
        <p class="subtitle">Sign in to your account</p>
        <div th:if="${param.error}" class="msg error">Invalid username or password</div>
        <div th:if="${param.logout}" class="msg success">You have been logged out</div>
        <div th:if="${success}" class="msg success" th:text="${success}"></div>
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Username" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Sign In</button>
        </form>
        <div class="footer">Don't have an account? <a th:href="@{/register}">Register</a></div>
    </div>
</body>
</html>
